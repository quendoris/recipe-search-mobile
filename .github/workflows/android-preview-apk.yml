name: Build Android Preview APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-android-preview-apk:
    name: Build Android preview APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Generate Android platform files if missing
        run: |
          if [ ! -d android ]; then
            flutter create . --platforms=android
          fi

      - name: Patch Android launch behavior
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text(encoding='utf-8')

          if 'android:launchMode=' in text:
              text = re.sub(r'android:launchMode="[^"]+"', 'android:launchMode="singleTask"', text, count=1)
          else:
              text = text.replace(
                  '<activity\n            android:name=".MainActivity"',
                  '<activity\n            android:name=".MainActivity"\n            android:launchMode="singleTask"',
              )

          if 'android:roundIcon=' not in text:
              text = text.replace(
                  'android:icon="@mipmap/ic_launcher"',
                  'android:icon="@mipmap/ic_launcher"\n        android:roundIcon="@mipmap/ic_launcher_round"',
                  1,
              )

          manifest.write_text(text, encoding='utf-8')
          print(manifest.read_text(encoding='utf-8'))
          PY

      - name: Patch Android launcher icon
        run: |
          python -m pip install --quiet pillow
          python - <<'PY'
          from pathlib import Path
          from PIL import Image, ImageDraw

          res = Path('android/app/src/main/res')
          densities = {
              'mipmap-mdpi': 48,
              'mipmap-hdpi': 72,
              'mipmap-xhdpi': 96,
              'mipmap-xxhdpi': 144,
              'mipmap-xxxhdpi': 192,
          }

          def gradient(size):
              img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
              px = img.load()
              for y in range(size):
                  for x in range(size):
                      nx = x / max(size - 1, 1)
                      ny = y / max(size - 1, 1)
                      t = (nx + ny) / 2
                      c1 = (108, 53, 255)
                      c2 = (236, 52, 200)
                      c3 = (255, 107, 134)

                      if t < 0.58:
                          k = t / 0.58
                          base = tuple(int(c1[i] * (1 - k) + c2[i] * k) for i in range(3))
                      else:
                          k = (t - 0.58) / 0.42
                          base = tuple(int(c2[i] * (1 - k) + c3[i] * k) for i in range(3))

                      cx = nx - 0.52
                      cy = ny - 0.42
                      glow = max(0, 1 - (cx * cx + cy * cy) / 0.23)
                      rgb = tuple(min(255, int(base[i] + glow * (255 - base[i]) * 0.28)) for i in range(3))
                      px[x, y] = (*rgb, 255)
              return img

          def rounded_mask(size, radius_ratio=0.22):
              mask = Image.new('L', (size, size), 0)
              draw = ImageDraw.Draw(mask)
              r = int(size * radius_ratio)
              draw.rounded_rectangle([0, 0, size - 1, size - 1], radius=r, fill=255)
              return mask

          def full_icon(size, rounded=True):
              bg = gradient(size)
              if rounded:
                  mask = rounded_mask(size)
                  out = Image.new('RGBA', (size, size), (0, 0, 0, 0))
                  out.paste(bg, (0, 0), mask)
                  return out
              return bg

          # Legacy launcher icons: gradient only, no chef hat.
          for folder, size in densities.items():
              target = res / folder
              target.mkdir(parents=True, exist_ok=True)
              full_icon(size, rounded=True).save(target / 'ic_launcher.png')
              full_icon(size, rounded=False).save(target / 'ic_launcher_round.png')

          # Adaptive foreground: fully transparent.
          fg_dir = res / 'drawable-nodpi'
          fg_dir.mkdir(parents=True, exist_ok=True)
          fg = Image.new('RGBA', (432, 432), (0, 0, 0, 0))
          fg.save(fg_dir / 'ic_launcher_foreground.png')

          # Adaptive background: purple-pink gradient.
          bg_dir = res / 'drawable'
          bg_dir.mkdir(parents=True, exist_ok=True)
          (bg_dir / 'ic_launcher_background.xml').write_text('''<?xml version="1.0" encoding="utf-8"?>\n<shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">\n    <gradient\n        android:type="linear"\n        android:angle="45"\n        android:startColor="#6F35FF"\n        android:centerColor="#EC34C8"\n        android:endColor="#FF6B86" />\n</shape>\n''', encoding='utf-8')

          anydpi = res / 'mipmap-anydpi-v26'
          anydpi.mkdir(parents=True, exist_ok=True)
          adaptive = '''<?xml version="1.0" encoding="utf-8"?>\n<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">\n    <background android:drawable="@drawable/ic_launcher_background" />\n    <foreground android:drawable="@drawable/ic_launcher_foreground" />\n</adaptive-icon>\n'''
          (anydpi / 'ic_launcher.xml').write_text(adaptive, encoding='utf-8')
          (anydpi / 'ic_launcher_round.xml').write_text(adaptive, encoding='utf-8')

          print('Launcher icon resources patched: gradient-only icon, no chef hat')
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart code non-blocking
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-debug.apk dist/recipe-search-mobile-v0.1.3-android-preview.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: recipe-search-mobile-v0.1.3-android-preview-apk
          path: dist/recipe-search-mobile-v0.1.3-android-preview.apk
          if-no-files-found: error
