name: Build Android Preview APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-android-preview-apk:
    name: Build Android preview APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Generate Android platform files if missing
        run: |
          if [ ! -d android ]; then
            flutter create . --platforms=android
          fi

      - name: Patch Android launch behavior
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text(encoding='utf-8')

          if 'android:launchMode=' in text:
              text = re.sub(r'android:launchMode="[^"]+"', 'android:launchMode="singleTask"', text, count=1)
          else:
              text = text.replace(
                  '<activity\n            android:name=".MainActivity"',
                  '<activity\n            android:name=".MainActivity"\n            android:launchMode="singleTask"',
              )

          if 'android:roundIcon=' not in text:
              text = text.replace(
                  'android:icon="@mipmap/ic_launcher"',
                  'android:icon="@mipmap/ic_launcher"\n        android:roundIcon="@mipmap/ic_launcher_round"',
                  1,
              )

          manifest.write_text(text, encoding='utf-8')
          print(manifest.read_text(encoding='utf-8'))
          PY

      - name: Patch Android launcher icon
        run: |
          python -m pip install --quiet pillow
          python - <<'PY'
          from pathlib import Path
          from PIL import Image, ImageDraw, ImageFilter

          res = Path('android/app/src/main/res')
          densities = {
              'mipmap-mdpi': 48,
              'mipmap-hdpi': 72,
              'mipmap-xhdpi': 96,
              'mipmap-xxhdpi': 144,
              'mipmap-xxxhdpi': 192,
          }

          def gradient(size):
              img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
              px = img.load()
              for y in range(size):
                  for x in range(size):
                      nx = x / max(size - 1, 1)
                      ny = y / max(size - 1, 1)
                      t = (nx + ny) / 2
                      # purple -> pink -> warm rose, with a soft light center
                      c1 = (108, 53, 255)
                      c2 = (236, 52, 200)
                      c3 = (255, 107, 134)
                      if t < 0.58:
                          k = t / 0.58
                          base = tuple(int(c1[i] * (1 - k) + c2[i] * k) for i in range(3))
                      else:
                          k = (t - 0.58) / 0.42
                          base = tuple(int(c2[i] * (1 - k) + c3[i] * k) for i in range(3))
                      cx = nx - 0.52
                      cy = ny - 0.42
                      glow = max(0, 1 - (cx * cx + cy * cy) / 0.23)
                      rgb = tuple(min(255, int(base[i] + glow * (255 - base[i]) * 0.28)) for i in range(3))
                      px[x, y] = (*rgb, 255)
              return img

          def rounded_mask(size, radius_ratio=0.22):
              mask = Image.new('L', (size, size), 0)
              draw = ImageDraw.Draw(mask)
              r = int(size * radius_ratio)
              draw.rounded_rectangle([0, 0, size - 1, size - 1], radius=r, fill=255)
              return mask

          def draw_hat(canvas, scale=1.0, shadow=True):
              size = canvas.size[0]
              draw = ImageDraw.Draw(canvas, 'RGBA')
              s = size * scale
              cx = size / 2
              top_y = size * 0.22
              bottom_y = size * 0.75
              white = (255, 255, 255, 255)
              shade = (222, 201, 238, 190)

              if shadow:
                  shadow_layer = Image.new('RGBA', canvas.size, (0, 0, 0, 0))
                  sd = ImageDraw.Draw(shadow_layer, 'RGBA')
                  sd.ellipse([cx - s*0.34, top_y + s*0.16, cx - s*0.01, top_y + s*0.49], fill=(64, 18, 92, 90))
                  sd.ellipse([cx + s*0.01, top_y + s*0.16, cx + s*0.34, top_y + s*0.49], fill=(64, 18, 92, 90))
                  sd.ellipse([cx - s*0.22, top_y, cx + s*0.22, top_y + s*0.45], fill=(64, 18, 92, 95))
                  sd.rounded_rectangle([cx - s*0.26, bottom_y - s*0.12, cx + s*0.26, bottom_y + s*0.03], radius=int(s*0.045), fill=(64, 18, 92, 110))
                  shadow_layer = shadow_layer.filter(ImageFilter.GaussianBlur(radius=max(1, int(size*0.018))))
                  canvas.alpha_composite(shadow_layer)

              # puffy top
              draw.ellipse([cx - s*0.21, top_y, cx + s*0.21, top_y + s*0.43], fill=white)
              draw.ellipse([cx - s*0.38, top_y + s*0.13, cx - s*0.04, top_y + s*0.49], fill=white)
              draw.ellipse([cx + s*0.04, top_y + s*0.13, cx + s*0.38, top_y + s*0.49], fill=white)
              # body bridge
              body = [
                  (cx - s*0.29, top_y + s*0.37),
                  (cx - s*0.23, bottom_y - s*0.11),
                  (cx + s*0.23, bottom_y - s*0.11),
                  (cx + s*0.29, top_y + s*0.37),
              ]
              draw.polygon(body, fill=white)
              # band
              draw.rounded_rectangle([cx - s*0.31, bottom_y - s*0.12, cx + s*0.31, bottom_y + s*0.045], radius=int(s*0.055), fill=white)
              # subtle folds and lower shade
              draw.arc([cx - s*0.27, top_y + s*0.31, cx - s*0.03, bottom_y - s*0.03], 170, 250, fill=shade, width=max(1, int(size*0.012)))
              draw.arc([cx + s*0.03, top_y + s*0.31, cx + s*0.27, bottom_y - s*0.03], -70, 10, fill=shade, width=max(1, int(size*0.012)))
              draw.line([cx - s*0.28, bottom_y - s*0.12, cx + s*0.28, bottom_y - s*0.12], fill=(211, 184, 229, 170), width=max(1, int(size*0.012)))

          def full_icon(size, rounded=True):
              bg = gradient(size)
              icon = Image.new('RGBA', (size, size), (0, 0, 0, 0))
              icon.alpha_composite(bg)
              draw_hat(icon, scale=1.0, shadow=True)
              if rounded:
                  mask = rounded_mask(size)
                  out = Image.new('RGBA', (size, size), (0, 0, 0, 0))
                  out.paste(icon, (0, 0), mask)
                  return out
              return icon

          # Legacy launcher icons. These are what many Android installers/file managers show.
          for folder, size in densities.items():
              target = res / folder
              target.mkdir(parents=True, exist_ok=True)
              full_icon(size, rounded=True).save(target / 'ic_launcher.png')
              full_icon(size, rounded=False).save(target / 'ic_launcher_round.png')

          # Adaptive icon foreground with real alpha transparency.
          fg_dir = res / 'drawable-nodpi'
          fg_dir.mkdir(parents=True, exist_ok=True)
          fg = Image.new('RGBA', (432, 432), (0, 0, 0, 0))
          draw_hat(fg, scale=1.0, shadow=False)
          fg.save(fg_dir / 'ic_launcher_foreground.png')

          # Adaptive icon background as Android drawable gradient.
          bg_dir = res / 'drawable'
          bg_dir.mkdir(parents=True, exist_ok=True)
          (bg_dir / 'ic_launcher_background.xml').write_text('''<?xml version="1.0" encoding="utf-8"?>\n<shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">\n    <gradient\n        android:type="linear"\n        android:angle="45"\n        android:startColor="#6F35FF"\n        android:centerColor="#EC34C8"\n        android:endColor="#FF6B86" />\n</shape>\n''', encoding='utf-8')

          anydpi = res / 'mipmap-anydpi-v26'
          anydpi.mkdir(parents=True, exist_ok=True)
          adaptive = '''<?xml version="1.0" encoding="utf-8"?>\n<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">\n    <background android:drawable="@drawable/ic_launcher_background" />\n    <foreground android:drawable="@drawable/ic_launcher_foreground" />\n</adaptive-icon>\n'''
          (anydpi / 'ic_launcher.xml').write_text(adaptive, encoding='utf-8')
          (anydpi / 'ic_launcher_round.xml').write_text(adaptive, encoding='utf-8')

          print('Launcher icon resources patched: adaptive + legacy mipmaps')
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart code non-blocking
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-debug.apk dist/recipe-search-mobile-v0.1.1-android-preview.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: recipe-search-mobile-v0.1.1-android-preview-apk
          path: dist/recipe-search-mobile-v0.1.1-android-preview.apk
          if-no-files-found: error
