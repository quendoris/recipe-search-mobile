name: Build Android Preview APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-android-preview-apk:
    name: Build Android preview APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Generate Android platform files if missing
        run: |
          if [ ! -d android ]; then
            flutter create . --platforms=android
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-debug.apk dist/recipe-search-mobile-v0.1.0-android-preview.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: recipe-search-mobile-v0.1.0-android-preview-apk
          path: dist/recipe-search-mobile-v0.1.0-android-preview.apk
          if-no-files-found: error
